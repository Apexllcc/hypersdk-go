name: Upstream Drift Check

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.26.5"
          check-latest: true
      - name: Validate reviewed upstream lock offline
        run: go run ./scripts/upstreamcheck -lock upstream.lock.json
      - name: Detect official protocol and Python SDK drift
        run: go run ./scripts/upstreamcheck -lock upstream.lock.json -network -total-timeout=45s
