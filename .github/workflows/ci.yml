name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          check-latest: true
      - name: Verify formatting
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Build packages and examples
        run: go build ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
