name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23.x'
          check-latest: true
      - name: Verify formatting
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Verify upstream compatibility lock (offline)
        run: go run ./scripts/upstreamcheck -lock upstream.lock.json
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Build packages and examples
        run: go build ./...
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m
